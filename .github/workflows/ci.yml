name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      # Build before typecheck so dependents can resolve emitted .d.ts types.
      - name: Build libraries
        run: bun run --filter '@web-file-reader/*' build

      - name: Typecheck
        run: bun run --filter '@web-file-reader/*' typecheck

      - name: Test
        run: bun run --filter '@web-file-reader/*' test

      - name: Build host
        run: bun run --filter wfr-host-astro build
